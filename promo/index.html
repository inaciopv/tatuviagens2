<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Promoção — Tatu Viagens</title>
</head>
<body>

  

  <header>
    <h1>Tatu <span>Viagens</span></h1>
    <nav><a href="../index.html">Home</a></nav>
    
  </header>

  
  <section class="banner-promo">
    <p class="badge">🎉 Oferta especial</p>
    <h2>Cadastre-se e receba nossas melhores promoções</h2>
    <p>Seja o primeiro a saber sobre pacotes com desconto para Cabo Frio e toda a Costa do Sol.</p>
  </section>

  
  <section class="formulario-section">

    
    <form class="form-promo" action="" method="post">

      <h3>Deixe seus dados</h3>
      <p class="form-subtitulo">É rápido, fácil e sem compromisso</p>

      <label for="nome">Seu nome</label>
    
      <input
        type="text"
        id="nome"
        name="nome"
        placeholder="Como podemos te chamar?"
        required
      >

      
      <label for="cidade">Sua cidade</label>
      <input
        type="text"
        id="cidade"
        name="cidade"
        placeholder="De onde você vai viajar?"
        required
      >

       <label for="número">Seu número</label>
      <input
        type="text"
        id="Número"
        name="Número"
        placeholder="Ex.: (31) 96767-6767"
        required
      >
      <label for="destino">Para onde quer viajar?</label>
<select id="destino" name="destino">
    <option value="" disabled selected>Selecione um destino</option>
    <option value="buzios">Cabo Frio</option>
    <option value="cabo-frio">Búzios</option>
    <option value="arraial">Arraial Do Cabo</option>
</select>

     
      <button type="submit">Quero as promoções!</button>

    </form>
  </section>

  
  <footer>
    <p>© 2026 <span>Tatu Viagens</span></p>
  </footer>

</body>
</html>
