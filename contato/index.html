<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Contato — Tatu Viagens</title>
</head>
<body>

  <!-- CABEÇALHO -->
  <header>
    <a href="../" class="logo">
      <h1>Tatu <span>Viagens</span></h1>
    </a>
    <nav>
      <a href="../">Início</a>
      <a href="../sobre/">Sobre</a>
    </nav>
  </header>

  <!-- BANNER DA PÁGINA -->
  <section class="banner">
    <h2>Entre em contato</h2>
    <p>Fale com a gente para tirar dúvidas</p>
  </section>

  <!-- CANAIS DE CONTATO -->
  <section class="contato">
    <div class="contato-grid">

      <!-- WHATSAPP -->
      <div class="canal">
        <div class="icone"><img src="../IMG/logowpp.png" widht="40"></div>
        <h3>WhatsApp</h3>
        <p>(31) 99920-0979</p>
        <!-- wa.me é o link direto para o WhatsApp. O número precisa ter o código do país (55 para Brasil) -->
        <a href="https://wa.me/5531999200979?text=Olá,%20tenho%20interesse%20nas%20excursões%20da%20Tatu%20Viagens!" target="_blank" class="btn-canal">
          Chamar no WhatsApp
        </a>
      </div>

      <!-- INSTAGRAM -->
      <div class="canal">
        <div class="icone"><img src="../IMG/logoig.png" widht="40"></div>
        <h3>Instagram</h3>
        <p>@tatuviagens</p>
        <!-- Altere o link abaixo para o perfil real quando tiver -->
        <a href="https://instagram.com/tatuviagens" target="_blank" class="btn-canal">
          Ver no Instagram
        </a>
      </div>

    </div>
  </section>

  <!-- RODAPÉ -->
  <footer>
    <p>© 2026 <span>Tatu Viagens</span> — Todos os direitos reservados</p>
  </footer>

</body>
</html>
